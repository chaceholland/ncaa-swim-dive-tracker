<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 300px;
      padding: 20px;
      font-family: Arial, sans-serif;
    }
    h2 {
      margin: 0 0 15px 0;
      color: #333;
    }
    button {
      width: 100%;
      padding: 12px;
      background: #0066cc;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 14px;
      cursor: pointer;
      margin-bottom: 10px;
    }
    button:hover {
      background: #0052a3;
    }
    #status {
      margin-top: 10px;
      padding: 10px;
      background: #f0f0f0;
      border-radius: 4px;
      font-size: 12px;
      display: none;
    }
    #status.show {
      display: block;
    }
    .success {
      background: #d4edda !important;
      color: #155724;
    }
  </style>
</head>
<body>
  <h2>CSD Headshot Scraper</h2>
  <button id="scrapeBtn">Scrape SEC Teams (7 teams)</button>
  <div id="status"></div>
  
  <script src="popup.js"></script>
</body>
</html>
